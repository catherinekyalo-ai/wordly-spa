<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wordly Dictionary</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Wordly</h1>
 <h2>wordly is a single-word dictionary</h2>
<button id="themeBtn">Dark Mode</button>

<form id="searchForm">
  <input type="text" id="wordInput" placeholder="Type a word..." required>
  <button type="submit">Search</button>
</form>

<div id="result"><p>Search for a word to see its definition.</p></div>

<div id="favorites">
  <h3>Favorites</h3>
  <ul id="favList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
