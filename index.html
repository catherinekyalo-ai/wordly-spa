<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wordly Dictionary</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>WORDLY DICTIONARY</h1>

  <div class="header">
    <h2>Wordly is a single-word dictionary</h2>
    <button id="themeBtn">Dark Mode</button>
</div>

<form id="searchForm">
  <input type="text" id="wordInput" placeholder="Type a word..." required>
  <button type="submit">Search</button>
</form>

<div id="result"></div>

<div id="favorites">
  <h3>Favorites</h3>
  <ul id="favList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
